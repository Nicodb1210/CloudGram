<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudGram ULTRA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b0f;--card:#16181f;--accent:#6c63ff;--accent2:#38bdf8;--text:#fff;--muted:#777}
body{margin:0;font-family:'DM Sans';background:var(--bg);color:var(--text)}
header{padding:20px;text-align:center;font-family:'Syne';font-weight:800;font-size:24px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.container{padding:20px;max-width:1300px;margin:auto}
input,button{padding:10px;border-radius:10px;border:none;font-family:'DM Sans'}
button{background:var(--accent);color:#fff;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:var(--card);padding:16px;border-radius:14px;border:1px solid rgba(255,255,255,.05);transition:.2s}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.progress{height:6px;background:#222;border-radius:10px;overflow:hidden;margin-top:10px;display:none}
.progress div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2))}
</style>
</head>
<body>
<header>☁️ CloudGram ULTRA</header>

<div class="container" id="login">
<h2>Acceso</h2>
<input id="user" placeholder="Usuario"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Entrar</button>
</div>

<div class="container" id="app" style="display:none">
<div class="topbar">
<button onclick="logout()">Salir</button>
<input type="file" id="file">
<input id="folder" placeholder="Carpeta">
<button onclick="upload()">Subir</button>
<input id="search" placeholder="Buscar" oninput="render()">
</div>

<div class="progress" id="prog"><div id="bar"></div></div>

<div id="files" class="grid"></div>
</div>

<script>
let files=[];

async function login(){
 const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:user.value,password:pass.value})});
 if(r.ok){init();}
}

async function logout(){
 await fetch('/api/logout',{method:'POST'});
 location.reload();
}

async function init(){
 login.style.display='none';
 app.style.display='block';
 load();
}

async function load(){
 const r=await fetch('/api/files');
 if(r.ok){files=await r.json();render();}
}

function render(){
 const q=search.value.toLowerCase();
 filesDiv.innerHTML='';
 files.filter(f=>f.nombre.toLowerCase().includes(q)).forEach(f=>{
  const d=document.createElement('div');
  d.className='card';
  d.innerHTML=`
    <b>${f.nombre}</b><br>
    ${f.tipo}<br>
    ${formatSize(f.size)}<br><br>
    <button onclick="download('${f.file_id}','${f.nombre}')">⬇</button>
    <button onclick="share('${f.file_id}')">🔗</button>
    <button onclick="preview('${f.file_id}','${f.tipo}')">👁</button>
    <button onclick="del(${f.id})">🗑</button>
  `;
  filesDiv.appendChild(d);
 });
}

function formatSize(s){
 if(!s) return '';
 if(s>1024) return (s/1024).toFixed(2)+' GB';
 if(s>1) return s.toFixed(2)+' MB';
 return (s*1024).toFixed(0)+' KB';
}

async function upload(){
 const prog=document.getElementById('prog');
 const bar=document.getElementById('bar');
 prog.style.display='block';

 const fd=new FormData();
 fd.append('archivo',file.files[0]);
 fd.append('carpeta',folder.value);

 const xhr=new XMLHttpRequest();
 xhr.open('POST','/api/upload');

 xhr.upload.onprogress=e=>{
  if(e.lengthComputable){bar.style.width=(e.loaded/e.total*100)+'%';}
 };

 xhr.onload=()=>{prog.style.display='none';bar.style.width='0%';load();};
 xhr.send(fd);
}

async function download(id,name){
 const r=await fetch('/api/download/'+id);
 const d=await r.json();
 const a=document.createElement('a');
 a.href=d.url;a.download=name;a.click();
}

function share(id){
 const url=location.origin+'/api/preview/'+id;
 navigator.clipboard.writeText(url);
 alert('Link copiado');
}

function preview(id,type){
 const url='/api/preview/'+id;
 window.open(url,'_blank');
}

async function del(id){
 await fetch('/api/delete/'+id,{method:'DELETE'});
 load();
}

const filesDiv=document.getElementById('files');
</script>
</body>
</html>
